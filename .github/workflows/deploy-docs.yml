name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Cairo dependencies (for social cards)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev

      - name: Sync README to docs
        run: uv run python scripts/sync_readme_to_docs.py

      - name: Build and deploy docs
        run: uv run mkdocs gh-deploy --force --clean --verbose
