# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Hooks
#   Please note the hooks below are intended to be installed as a pre-push hook, e.g. specifying the --hook-type option:
#     prek install --hook-type pre-push
# Hooks can and should be customized for personal and project-specific settings.
# Checking in to the repository should be aligned with the other service maintainers.
default_language_version:
  python: python3.14

default_stages: [pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.7"
    hooks:
      - id: ruff
        name: Ruff Linter
        args: ["--fix"]
        stages: [pre-commit, pre-push]
      - id: ruff-format
        name: Ruff Formatter
        stages: [pre-commit, pre-push]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.12
    hooks:
      - id: uv-lock
      - id: uv-export
        args: [--frozen, --no-hashes, --output-file, requirements.txt]
