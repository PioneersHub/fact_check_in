########################################################################################
########################################################################################
# This is the BASIC configuration, it's always loaded.
# To change the configuration depending on the environment, any params there will
# overwrite settings below.
# Omegaconf replaces all references to e.g. ${default.HOST} with one line/update for
# all nodes using the reference once loaded `default.HOST = "cool.com"`.
########################################################################################
########################################################################################

MODE: null

PROJECT_NAME: Fact Check-In

LOG:
  DIR: ../log/app
  NAME: fact-check-in.log
  TO_FILE: false
  TO_SCREEN: false

# application settings
APP:
  PORT: 9898
  HOST: "127.0.0.1"

# Ticketing backend: "tito" or "pretix"
TICKETING_BACKEND: tito

include_activities:
  # activities that are relevant for this service
  - on_site
  - online_access

organizer_speakers:
  - "XYZA-1"  # J Doe

# Optional: patterns to exclude certain ticket types
exclude_ticket_patterns: []

# Name validation thresholds
name_matching:
  # Names matching above this threshold are considered exact matches
  exact_match_threshold: 0.95
  # Names matching above this threshold are considered close matches
  close_match_threshold: 0.8

# Pretix category and item mapping configuration
pretix_mapping:
  # Category-based attribute mappings
  categories:
    # Map by category ID (most reliable)
    by_id:
      # Example mappings - add your category IDs here
      # 999001: 
      #   is_speaker: true
      # 999002:
      #   is_sponsor: true
    
    # Map by category name (case-insensitive fallback)
    by_name:
      "speaker":
        is_speaker: true
      "sponsor":
        is_sponsor: true
      "volunteer":
        is_volunteer: true
      "organizer":
        is_organizer: true
      "vip":
        is_guest: true
  
  # Product name patterns for access types
  access_patterns:
    remote:
      keywords: ["remote", "online", "virtual", "streaming"]
      attributes:
        is_remote: true
        is_onsite: false
        online_access: true
    onsite:
      keywords: ["in-person", "on-site", "physical", "venue", "conference pass"]
      attributes:
        is_remote: false
        is_onsite: true
        online_access: true
    day_pass:
      keywords: ["day pass"]
      attributes:
        is_onsite: true
        online_access: true
  
  # Product name patterns for attendee types (when not using categories)
  attendee_patterns:
    speaker:
      keywords: ["speaker"]
      attributes:
        is_speaker: true
    sponsor:
      keywords: ["sponsor"]
      attributes:
        is_sponsor: true
    volunteer:
      keywords: ["volunteer"]
      attributes:
        is_volunteer: true
    organizer:
      keywords: ["organiser", "organizer"]
      attributes:
        is_organizer: true

